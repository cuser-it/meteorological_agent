spring:
  application:
    name: meteorological-agent
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
    openai:
      api-key: ${OPENAI_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        completions-path: ${SPRING_AI_OPENAI_CHAT_COMPLETIONS_PATH:/chat/completions}
        options:
          model: ${OPENAI_MODEL:qwen-plus}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  ai:
    provider: ${AI_PROVIDER:openai-compatible}
    model: ${OPENAI_MODEL:qwen-plus}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
    max-retries: ${AI_MAX_RETRIES:2}
  prompt:
    base-path: classpath:/prompts
    active-version: v1

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
  level:
    com.shenzhen.meteorologicalagent: INFO
